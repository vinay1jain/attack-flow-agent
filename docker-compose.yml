version: "3.9"

services:
  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./agent/.env
    volumes:
      - ./agent:/app
      - ttp_chainer_data:/app/ttp_chainer
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  ttp_chainer_data:
